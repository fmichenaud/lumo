name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Sélectionner Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Installer XcodeGen
        run: brew install xcodegen

      - name: Générer le projet
        run: xcodegen generate

      - name: Build (Release)
        run: |
          xcodebuild -project Lumo.xcodeproj -scheme Lumo \
            -configuration Release -derivedDataPath build build

      - name: Empaqueter le .dmg
        run: |
          APP="build/Build/Products/Release/Lumo.app"
          mkdir -p dmg && cp -R "$APP" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname Lumo -srcfolder dmg -ov -format UDZO Lumo.dmg

      - name: Publier la release
        uses: softprops/action-gh-release@v2
        with:
          files: Lumo.dmg
          body: |
            ### Lumo — build non signée

            Téléchargez `Lumo.dmg`, glissez Lumo dans Applications.

            ⚠️ Au **premier lancement** : clic droit sur Lumo → **Ouvrir**
            (ou Réglages Système → Confidentialité et sécurité → « Ouvrir quand même »).
            C'est normal pour une app non notarisée.
