name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Sélectionner Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable   # nécessite Xcode 26+ (APIs Liquid Glass)

      - name: Installer XcodeGen
        run: brew install xcodegen

      - name: Générer le projet
        run: xcodegen generate

      # Les runners GitHub tournent sous macOS 15 : on compile (cross-build vers la
      # cible macOS 26), mais l'exécution des tests nécessite un hôte macOS 26
      # → lancez `xcodebuild … test` en local. Bascule possible vers un runner macOS 26
      # quand l'image sera disponible.
      - name: Build (vérification de compilation)
        run: |
          xcodebuild -project Lumo.xcodeproj -scheme Lumo \
            -destination 'platform=macOS' build
